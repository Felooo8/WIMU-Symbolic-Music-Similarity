name: tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
      - name: Install dependencies
        run: poetry install
      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short
